name: home_care
description: "A new Flutter project."

publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.9

  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  freezed_annotation: ^3.1.0

  dio: ^5.9.2

  get_it: ^9.2.1

  go_router: ^17.3.0

  dartz: ^0.10.1

  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.5.0

  hive: ^2.2.3
  hive_flutter: ^1.1.0

  json_annotation: ^4.12.0
