  firebase_messaging: ^16.3.0
  flutter_local_notifications: ^19.4.0
  cloud_functions: ^6.3.2
  flutter_screenutil: ^5.9.3

  

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  build_runner: ^2.4.9
  freezed: ^3.2.5
  json_serializable: ^6.8.0

  flutter_native_splash: ^2.4.8


flutter:
